<head>

  <title>trinitrotorol | ゲーム攻略・ツール</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --surface: #fff;
      --text: #17202a;
      --muted: #586473;
      --line: #d9e0ea;
      --accent: #0b6bcb;
      --accent-soft: #e8f2ff;
      --shadow: 0 18px 42px rgba(28, 42, 58, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.7;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 64px 0 32px;
    }

    .hero {
      padding: 40px 0 56px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.25rem, 9vw, 5rem);
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 700;
    }

    h2 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      line-height: 1.25;
      margin-bottom: 20px;
    }

    h3 {
      font-size: 1.15rem;
      line-height: 1.35;
      margin-bottom: 8px;
    }

    .lead {
      max-width: 42rem;
      margin-top: 18px;
      color: var(--muted);
      font-size: clamp(1rem, 3vw, 1.2rem);
    }

    .content-section {
      padding: 32px 0;
      border-top: 1px solid var(--line);
    }

    .card-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .guide-card {
      display: block;
      min-height: 160px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      text-decoration: none;
    }

    .guide-card:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    .guide-card:hover h3 {
      color: var(--accent);
    }

    .guide-card p {
      color: var(--muted);
      font-size: 1rem;
    }

    .tag {
      display: inline-block;
      margin-bottom: 14px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .site-footer {
      padding-top: 32px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 24px, 960px);
        padding-top: 36px;
      }

      .hero {
        padding: 28px 0 40px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>trinitrotorol</h1>
      <p class="lead">ゲーム攻略情報と、ブラウザで利用できる攻略ツールを公開しているサイトです。</p>
    </header>
    <main>
      <section class="content-section" aria-labelledby="guides-heading">
        <h2 id="guides-heading">攻略コンテンツ</h2>
        <div class="card-list">
          <a class="guide-card" href="/game-guide/exponential-idle-minigame-guide/">
            <span class="tag">Exponential Idle</span>
            <h3>Exponential Idle ミニゲーム攻略・ソルバー</h3>
            <p>Arrow、15-Puzzle、Torusの盤面を入力して解法を確認できます。</p>
          </a>
        </div>
      </section>
    </main>
    <footer class="site-footer">
      <p>&copy; 2026 trinitrotorol</p>
    </footer>
  </div>
</body>
</html>
