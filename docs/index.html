<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <meta http-equiv="refresh" content="0; url=https://trinitrotorol.com">
  <title>trinitrotorol.comへ移動します</title>
  <script>
    const destinationOrigin = "https://trinitrotorol.com";
    const destination = destinationOrigin + window.location.pathname + window.location.search + window.location.hash;
    window.location.replace(destination);
  </script>
</head>
<body>
  <p><a href="https://trinitrotorol.com">trinitrotorol.comへ移動します。</a></p>
</body>
</html>
